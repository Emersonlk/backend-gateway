version: "3.9"

services:
  app:
    build: .
    container_name: backend-gateway-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: payments
      DB_USERNAME: root
      DB_PASSWORD: rootroot
      GATEWAY1_BASE_URL: http://gateways-mock:3001
      GATEWAY2_BASE_URL: http://gateways-mock:3002
    depends_on:
      - mysql
      - gateways-mock

  mysql:
    image: mysql:8.0
    container_name: backend-gateway-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootroot
      MYSQL_DATABASE: payments
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  gateways-mock:
    image: matheusprotzen/gateways-mock
    container_name: backend-gateways-mock
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3002:3002"

volumes:
  db-data:
    driver: local

